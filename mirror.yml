name: bun
target:
  registry: ocx.sh
  repository: bun

source:
  type: github_release
  owner: oven-sh
  repo: bun
  tag_pattern: "^bun-v(?P<version>\\d+\\.\\d+\\.\\d+)$"

assets:
  linux/amd64:
    - "bun-linux-x64\\.zip$"
  linux/arm64:
    - "bun-linux-aarch64\\.zip$"
  darwin/amd64:
    - "bun-darwin-x64\\.zip$"
  darwin/arm64:
    - "bun-darwin-aarch64\\.zip$"
  windows/amd64:
    - "bun-windows-x64\\.zip$"

asset_type:
  type: archive
  strip_components: 1

metadata:
  default: metadata.json

skip_prereleases: true
cascade: true
build_timestamp: none

versions:
  min: "1.3.10"
  new_per_run: 5
  poll_interval: "0 */6 * * *"

verify:
  github_asset_digest: true

concurrency:
  max_downloads: 8
  max_bundles: 4
  max_pushes: 2
  rate_limit_ms: 100
  max_retries: 3
  compression_threads: 0

tests:
  - name: smoke
    script: tests/smoke.star

platforms:
  linux/amd64:
    runner: ubuntu-latest
  linux/arm64:
    runner: ubuntu-24.04-arm
  darwin/amd64:
    runner: macos-14
    prefix: ["arch", "-x86_64"]
    # darwin/amd64 is DECLARED but HELD broken across the entire version range.
    # bun-compiled binaries SIGILL (exit 132) under Rosetta 2 — a native-startup
    # illegal instruction, proven across mainline, the -baseline asset, AND
    # BUN_JSC_useJIT=0 (so it is NOT a JIT/AVX2 path disableable by asset/env).
    # GitHub retired native Intel macOS runners, so the Intel slice cannot be
    # CI-validated at all. Rather than silently drop it (as opencode did), an
    # open-ended `severity: broken` exclude keeps the platform VISIBLE as a 🔒
    # row — a deliberate, documented gap — and is reversible in one block-delete
    # if native Intel runners or a Rosetta-safe bun build ever return. The Intel
    # binary still runs fine on real Intel Macs; it just can't be tested here.
    exclude:
      - min_version: "0.0.0"   # whole range — every discovered version
        severity: broken
        reason: "bun SIGILLs under Rosetta 2; no native Intel macOS runner to CI-test"
  darwin/arm64:
    runner: macos-14
    shell: bash
  windows/amd64:
    runner: windows-latest
    shell: pwsh

notify:
  discord:
    webhook_secret: OCX_MIRROR_DISCORD_HOOK
    user_id: "227748867204972545"  # pinged in-message on failures
